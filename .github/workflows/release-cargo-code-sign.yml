name: "Release cargo-code-sign"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.1.0)"
        required: true
        type: string
      dry-run:
        description: "Dry run (skip publish and tag)"
        type: boolean
        default: false

permissions: {}

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10
  TAG: "cargo-code-sign-v${{ inputs.version }}"

jobs:
  check-version:
    name: "Check version coherence"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: "Verify version matches Cargo.toml"
        run: |
          actual=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "cargo-code-sign") | .version')
          if [ "$actual" != "${{ inputs.version }}" ]; then
            echo "::error::Input version '${{ inputs.version }}' does not match Cargo.toml version '$actual'"
            exit 1
          fi

  build:
    name: "Build (${{ matrix.target }})"
    needs: [check-version]
    timeout-minutes: 20
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: Swatinem/rust-cache@v2

      - name: "Install Rust toolchain"
        run: rustup target add ${{ matrix.target }}

      - name: "Install cross-compilation tools"
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: "Build"
        run: cargo build --release --target ${{ matrix.target }} --package cargo-code-sign --locked

      - name: "Package (unix)"
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cargo-code-sign-${{ matrix.target }}.tar.gz cargo-code-sign

      - name: "Package (windows)"
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../cargo-code-sign-${{ matrix.target }}.zip cargo-code-sign.exe

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: cargo-code-sign-${{ matrix.target }}
          path: cargo-code-sign-${{ matrix.target }}.*

  publish:
    name: "Publish to crates.io"
    needs: [build]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    environment: ${{ !inputs.dry-run && 'release' || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: "Publish"
        if: ${{ !inputs.dry-run }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --package cargo-code-sign --locked

  release:
    name: "Tag and release"
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: [build, publish]
    if: ${{ !inputs.dry-run }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: "Download artifacts"
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: "Create tag"
        run: |
          git tag "$TAG"
          git push origin "$TAG"

      - name: "Create release"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "$TAG" \
            --generate-notes \
            artifacts/*
